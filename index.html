<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<title>KARAIBY 2027</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: radial-gradient(circle at center, #0f172a, #020617);
    font-family: Arial, sans-serif;
    color:white;
    text-align:center;
}

.container{
    background: rgba(0,0,0,0.6);
    padding:60px;
    border-radius:20px;
    box-shadow:0 0 40px rgba(0,0,0,0.9);
}

.title{
    font-size:60px;
    letter-spacing:8px;
    margin-bottom:40px;
    color:#38bdf8;
    text-shadow:0 0 15px #38bdf8;
}

#countdown{
    font-size:70px;
    font-weight:bold;
    letter-spacing:6px;
}

.mystery{
    margin-top:30px;
    font-size:14px;
    opacity:0.6;
    letter-spacing:3px;
}
</style>
</head>

<body>

<div class="container">
    <div class="title">CARIBBEAN 2027</div>
    <div id="countdown">...</div>
</div>

<script>
const targetDate = new Date("June 26, 2027 00:00:00").getTime();

const timer = setInterval(function(){

    const now = new Date().getTime();
    const distance = targetDate - now;

    const days = Math.floor(distance / (1000 * 60 * 60 * 24));
    const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
    const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
    const seconds = Math.floor((distance % (1000 * 60)) / 1000);

    document.getElementById("countdown").innerHTML =
    days + "d " + hours + "h " + minutes + "m " + seconds + "s";

    if(distance < 0){
        clearInterval(timer);
        document.getElementById("countdown").innerHTML = "CZAS WYRUSZYC";
    }

},1000);
</script>

</body>

</html>
